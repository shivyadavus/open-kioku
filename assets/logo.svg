<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Open Kioku logo">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0C10"/>
      <stop offset="100%" stop-color="#12131a"/>
    </linearGradient>
    <linearGradient id="mark-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00CEC9"/>
      <stop offset="100%" stop-color="#6C5CE7"/>
    </linearGradient>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00CEC9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6C5CE7" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Background plate (square with rounded corners) -->
  <rect width="256" height="256" rx="48" ry="48" fill="url(#bg-grad)"/>

  <!-- Outer ring — partial arc suggesting an index / orbit -->
  <circle cx="128" cy="128" r="84" fill="none" stroke="url(#ring-grad)" stroke-width="3" stroke-dasharray="340 190" stroke-dashoffset="-30" stroke-linecap="round"/>

  <!-- Inner ring -->
  <circle cx="128" cy="128" r="62" fill="none" stroke="url(#ring-grad)" stroke-width="1.5" stroke-dasharray="200 190" stroke-dashoffset="60" stroke-linecap="round"/>

  <!-- Central mark: stylised "ok" made from two geometric shapes -->
  <!-- Left element: vertical bar (the "o" spine) -->
  <rect x="96" y="88" width="12" height="80" rx="6" fill="url(#mark-grad)"/>

  <!-- Right element: two diagonal strokes forming a "k" -->
  <!-- Upper diagonal -->
  <line x1="114" y1="128" x2="152" y2="88" stroke="url(#mark-grad)" stroke-width="12" stroke-linecap="round"/>
  <!-- Lower diagonal -->
  <line x1="114" y1="128" x2="152" y2="168" stroke="url(#mark-grad)" stroke-width="12" stroke-linecap="round"/>

  <!-- Node dot at the intersection — the "memory" metaphor -->
  <circle cx="114" cy="128" r="7" fill="#00CEC9"/>

  <!-- Three tiny connector dots radiating outward — graph / index metaphor -->
  <circle cx="84" cy="96" r="4" fill="#6C5CE7" opacity="0.7"/>
  <circle cx="172" cy="108" r="3" fill="#00CEC9" opacity="0.6"/>
  <circle cx="172" cy="148" r="3" fill="#6C5CE7" opacity="0.6"/>

  <!-- Connector lines from central node to satellites -->
  <line x1="114" y1="128" x2="84" y2="96" stroke="#6C5CE7" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="114" y1="128" x2="172" y2="108" stroke="#00CEC9" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="114" y1="128" x2="172" y2="148" stroke="#6C5CE7" stroke-width="1" stroke-opacity="0.4"/>
</svg>
