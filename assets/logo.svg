<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Open Kioku logo">
  <defs>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00CEC9"/>
      <stop offset="100%" stop-color="#6C5CE7"/>
    </linearGradient>
  </defs>

  <!-- Background plate -->
  <rect width="256" height="256" rx="52" fill="#0B0C10"/>

  <!-- Outer lens ring -->
  <ellipse cx="128" cy="128" rx="90" ry="60" fill="none" stroke="url(#g3)" stroke-width="4"/>
  <!-- Inner lens subtle fill -->
  <ellipse cx="128" cy="128" rx="86" ry="56" fill="#00CEC9" fill-opacity="0.04"/>

  <!-- Left bracket -->
  <path d="M100 100 L80 128 L100 156" fill="none" stroke="url(#g3)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right bracket -->
  <path d="M156 100 L176 128 L156 156" fill="none" stroke="url(#g3)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Central pupil / memory core -->
  <circle cx="128" cy="128" r="8" fill="url(#g3)"/>

  <!-- Lens glare points -->
  <circle cx="128" cy="70" r="3" fill="#00CEC9" opacity="0.5"/>
  <circle cx="128" cy="186" r="3" fill="#6C5CE7" opacity="0.5"/>
</svg>
