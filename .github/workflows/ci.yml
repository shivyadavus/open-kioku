name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all
      - run: cargo test -p open-kioku-tests
      - name: release readiness smoke
        run: scripts/verify-release-readiness.sh
      - name: Cursor starter smoke
        run: OK_BIN=target/debug/ok examples/cursor/smoke.sh
      - name: Claude starter smoke
        run: OK_BIN=target/debug/ok examples/claude/smoke.sh

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: install audit tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny
      - name: cargo audit
        run: cargo audit --ignore RUSTSEC-2024-0437
      - name: cargo deny check
        run: cargo deny check

  manifest-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate manifest versions match Cargo.toml
        run: |
          chmod +x scripts/validate-versions.sh
          scripts/validate-versions.sh
      - name: Validate documentation counts
        run: |
          chmod +x scripts/validate-docs.sh
          scripts/validate-docs.sh
