name: Feature Request
description: Suggest a new feature or improvement for Open Kioku
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for Open Kioku? We'd love to hear it. Please describe the problem you're trying to solve and your proposed approach.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Use Case
      description: What problem does this feature solve? Describe the use case or pain point.
      placeholder: |
        When I'm using `ok impact` on a large monorepo, I need to…
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work? Include CLI commands, MCP tool signatures, or behavior descriptions.
      placeholder: |
        A new `ok foo --bar` command that…
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      description: Which part of Open Kioku does this relate to?
      options:
        - CLI
        - MCP tools
        - Search / ranking
        - Impact analysis
        - Planning
        - Context / memory
        - Parsing / languages
        - Packaging / install
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, mockups, or references that might help.
      placeholder: Add any other context here…
    validations:
      required: false
