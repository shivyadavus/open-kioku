name: Bug Report
description: Report a bug in Open Kioku
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below so we can reproduce and fix the issue quickly.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug…
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps to reproduce the behavior.
      placeholder: |
        1. Run `ok init`
        2. Run `ok index`
        3. Run `ok search "foo"`
        4. See error…
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
      placeholder: Describe what should have happened…
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages, stack traces, or screenshots if applicable.
      placeholder: Describe what actually happened…
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Install Method
      options:
        - npm
        - Homebrew
        - cargo-binstall
        - crates.io
        - GitHub Release
        - Source
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: "`ok` Version"
      description: "Run `ok --version` and paste the output."
      placeholder: "e.g. ok 2.0.0"
    validations:
      required: true

  - type: dropdown
    id: mcp-client
    attributes:
      label: MCP Client
      description: Which MCP client were you using, if any?
      options:
        - Cursor
        - Claude
        - Codex
        - Gemini
        - OpenCode
        - Zed
        - Windsurf
        - Trae
        - "None / CLI only"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, logs, or screenshots that might help.
      placeholder: Add any other context here…
    validations:
      required: false
