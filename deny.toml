[advisories]
ignore = [
    "RUSTSEC-2024-0437",
    "RUSTSEC-2024-0384",
    "RUSTSEC-2026-0002"
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "ISC",
    "Zlib",
    "Unlicense",
    "MPL-2.0",
    "CC0-1.0",
    "CC0",
    "Unicode-3.0"
]
confidence-threshold = 0.8
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
