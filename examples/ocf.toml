[repo]
name = "example-platform"
root = "."

[index]
incremental = true
max_file_size = "1mb"
exclude = ["**/.git/**", "**/node_modules/**", "**/target/**", "**/dist/**", "**/build/**", "**/.venv/**"]

[languages]
enabled = ["rust", "java", "typescript", "python", "go", "yaml", "json", "sql"]

[scip]
enabled = true
auto_generate = false
paths = [".ocf/indexes/java.scip", ".ocf/indexes/typescript.scip", ".ocf/indexes/python.scip"]

[search]
lexical = "tantivy"
semantic = "disabled"
structural = true

[semantic]
enabled = false
provider = "local"
model = ""

[mcp]
mode = "read-only"
transport = "stdio"
allow_write = false

[security]
redact_secrets = true
deny_network = true
allow_hidden_files = false
allow_write = false
approval_required = true

[commands]
allow = ["cargo test", "cargo check", "mvn test", "npm test", "pytest"]

[paths]
deny = [".env", ".aws/**", ".ssh/**", "**/secrets/**"]

[architecture]
rules = ".ocf/architecture-rules.yml"

